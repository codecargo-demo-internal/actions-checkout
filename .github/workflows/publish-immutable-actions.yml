name: 'Publish Immutable Action Version'

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checking out
        uses: actions/checkout@b4ffbf834c0dab474d1183b81b8f8352c5a1c4bd
      - name: Publish
        id: publish
        uses: actions/publish-immutable-action@8f5e0e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e
      - name: Log deployment
        run: |
          echo "Deployment Summary:"
          echo "Action Version: ${{ github.ref_name }}"
          echo "Target Environment: GitHub Packages Registry"
          echo "Deployment Status: Success"
          echo "Published immutable action version for release: ${{ github.ref_name }}"
